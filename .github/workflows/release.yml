name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            artifact_name: PG-Tracker-2.1.1-win-setup.exe
            build_cmd: npm run build:win

          - platform: macos
            artifact_name: PG-Tracker-Mac-2.1.1.dmg
            build_cmd: npm run build:mac-standalone

          - platform: linux
            artifact_name: PG-Tracker-Linux-2.1.1.AppImage
            build_cmd: npm run build:linux-standalone

    runs-on: ${{ matrix.platform }}-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/${{ matrix.artifact_name }}
            dist-mac/*.zip
            dist-linux/*.AppImage
            dist-linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
